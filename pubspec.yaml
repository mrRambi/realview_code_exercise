name: realview_code_exercise
description: "Book Author Search App - REALVIEW Technical Assignment"
publish_to: 'none'
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Network
  dio: ^5.9.0
  retrofit: ^4.4.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Utilities
  fpdart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.10.4
  riverpod_generator: ^2.6.5
  json_serializable: ^6.11.2
  freezed: ^2.5.8
  retrofit_generator: ^9.1.4

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
