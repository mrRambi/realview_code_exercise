name: realview_code_exercise
description: "Book Author Search App - REALVIEW Technical Assignment"
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # State Management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Network
  dio: ^5.9.0
  retrofit: ^4.4.1

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^3.0.0

  # Utilities
  fpdart: ^1.2.0

  # Connectivity
  connectivity_plus: ^6.1.4

  # Image Caching
  cached_network_image: ^3.4.1

  # Loading Animation
  loading_animation_widget: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lint: ^2.8.0

  # Code Generation
  build_runner: ^2.10.4
  riverpod_generator: ^4.0.3
  json_serializable: ^6.11.2
  freezed: ^3.0.0
  retrofit_generator: ^10.2.1

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
